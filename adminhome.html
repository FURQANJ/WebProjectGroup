<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Pusat Sukan Court Booking</title>
    <link rel="stylesheet" href="style.css">
</head>

<style>
    body {
        margin: 0;
        font-family: Arial, sans-serif;
        color: #fff;
        text-align: center;
        background: url('Main Background.png') no-repeat center center fixed;
        background-size: cover;
    }

    header {
        background: rgba(0, 0, 0, 0.6);
        padding: 15px;
        display: flex;
        justify-content: space-between;
        align-items: center;
    }

    header h1 {
        margin: 0;
        font-size: 22px;
    }

    nav button {
        margin: 0 5px;
        padding: 10px 15px;
        border: none;
        background: #0077cc;
        color: #fff;
        cursor: pointer;
        border-radius: 5px;
    }

    nav button:hover {
        background: #005fa3;
    }

    main {
        margin-top: 60px;
    }

    .top-row {
        display: flex;
        justify-content: center;
        gap: 40px;
        margin-bottom: 40px;
    }

    .bottom-row {
        display: flex;
        justify-content: center;
        gap: 40px;
    }

    .card h2 {
        font-size: 18px;
        line-height: 1.3;
        margin-bottom: 20px;
    }

    .card {
        background: rgba(0, 0, 0, 0.5);
        padding: 25px;
        border-radius: 15px;
        width: 250px;
        height: 260px;

        display: flex;
        flex-direction: column;
        align-items: center;
    }

    .log-img {
        width: 120px;
        height: 120px;
        object-fit: contain;
        margin: 20px auto;
    }

    .booking-img {
        width: 130px;
        height: 130px;
        object-fit: contain;
        margin: 15px auto;
    }

    .update-img {
        width: 170px;
        height: 100px;
        object-fit: contain;
        margin: 30px auto;
    }

.container{
    display:flex;
    min-height:100vh;
}

.sidebar{
    width:250px;
    background:rgba(205, 200, 200, 0.95);

    display:flex;
    flex-direction:column;

    padding:20px;
}

.sidebar .logo{
    width:120px;
    margin:0 auto 30px;
}

.sidebar a{
    color:white;
    text-decoration:none;

    padding:15px;
    margin-bottom:10px;

    border-radius:8px;

    transition:0.3s;
}

.sidebar a:hover{
    background:#0077cc;
}

.content{
    flex:1;
}

</style>

<body>
    <div class="container">
        <div class="sidebar">
            <img src="utemlogo.png" alt="UTeM Logo" class="logo">

            <a href="#">Booking Log</a>
            <a href="#">Booking Requests</a>
            <a href="#">Court/Equipment Update</a>

        </div>


        <div class="content">
            <header>
            <nav>
                <button>BOOKING SPACE</button>
                <button>APPROVAL/STATUS</button>
            </nav>
        </header>
            <main>
                <div class="top-row">
                    <div class="card">
                        <h2>PUSAT SUKAN BOOKING LOG</h2>
                        <img src="log logo.jpeg" alt="log" class="log-img">
                        <!-- <button>Book Now</button> -->
                    </div>


                    <div class="card">
                        <h2>PUSAT SUKAN BOOKING REQUESTS</h2>
                        <img src="booking logo.jpeg" alt="booking" class="booking-img">
                        <!-- <button>Book Now</button> -->
                    </div>
                </div>

                <div class="bottom-row">
                    <div class="card">
                        <h2>EQUIPMENT/COURT UPDATE</h2>
                        <img src="updatelogo.jpeg" alt="update" class="update-img">
                        <!-- <button>Book Now</button> -->
                    </div>
                </div>

            </main>

        </div>

    </div>
</body>

</html>
