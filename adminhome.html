<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Pusat Sukan Court Booking</title>
    <link rel="stylesheet" href="style.css">
</head>

<style>
    body {
        margin: 0;
        font-family: Arial, sans-serif;
        color: #fff;
        text-align: center;
        background: url('Main Background.png') no-repeat center center fixed;
        background-size: cover;
    }

    /* header {
        background: rgba(0, 0, 0, 0.6);
        padding: 15px;
        display: flex;
        justify-content: space-between;
        align-items: center;
    } */

    header h1 {
        margin: 0;
        font-size: 22px;
    }

    /* nav button {
        margin: 0 5px;
        padding: 10px 15px;
        border: none;
        background: #0077cc;
        color: #fff;
        cursor: pointer;
        border-radius: 5px;
    }

    nav button:hover {
        background: #005fa3;
    } */

    main {
        margin-top: 60px;
    }

    .top-row {
        display: flex;
        justify-content: center;
        gap: 40px;
        margin-bottom: 40px;
    }

    .bottom-row {
        display: flex;
        justify-content: center;
        gap: 40px;
    }


.card{
    width:350px;
    height:220px;
    background:white;
    border-radius:10px;
    display:flex;
    flex-direction:column;
    align-items:center;
    padding:15px;
}
.card h2 {
    margin-bottom:10px;
    color:black;
    font-size:18px;
    text-align:center;
}

.card img{
    width:60%;
    height:60%;
    object-fit:contain;
    margin-top:15px;
}
    
.container{
    display:flex;
    height:800px;
}

.sidebar{
    width:350px;
    background:#D3D3D3;
    display:flex;
    flex-direction:column;
    /* padding:20px; */
}

.sidebar .logo{
    width:120px;
    margin:0 auto 30px;
}

.sidebar a{
    color:white;
    text-decoration:none;
    border: black solid 2px;
    padding: 15px;
    margin-bottom: 10px;
    color: #000000;
    font-size: 10px;
    text-align: left;
    font-weight: bold;

    /* transition:0.3s; */
}

.sidebar a:hover{
    background:#0077cc;
}

.content{
    flex:1;
}

</style>

<body>
    <div class="container">
        <div class="sidebar">
            <img src="UTeM White.png" alt="UTeM Logo" class="logo">

            <a href="#">Booking Log</a>
            <a href="#">Booking Requests</a>
            <a href="#">Court/Equipment Update</a>

        </div>


        <div class="content">
            <!-- <header>
                <nav>
                    <button>BOOKING SPACE</button>
                    <button>APPROVAL/STATUS</button>
                </nav>
            </header> -->
            <main>
                <div class="top-row">
                    <div class="card">
                        <h2>PUSAT SUKAN BOOKING LOG</h2>
                        <img src="log logo.jpeg" alt="booking log">
                    </div>
        
                    <div class="card">
                        <h2>PUSAT SUKAN BOOKING REQUESTS</h2>
                        <img src="booking logo.jpeg" alt="booking request">
                    </div>
        
        
        
                </div>
        
                <div class="bottom-row">
        
                    <div class="card">
                        <h2>EQUIPMENT/COURT UPDATE</h2>
                        <img src="updatelogo.jpeg" alt="equipment update">
                    </div>
                    
                </div>

            </main>

        </div>

    </div>
</body>

</html>
