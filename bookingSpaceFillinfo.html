<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Booking Space</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      color: #000;
      background: url('Main Background.png') no-repeat center center fixed;
      background-size: cover;
      min-height: 100vh;
      display: flex;
    }

    header {
      width: 250px;
      min-height: 100vh;
      background: #d3d3d3;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding-top: 50px;
    }

    .logo img {
      width: 150px;
      height: auto;
      margin-bottom: 95px;
    }

    nav {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    nav button {
      width: 100%;
      padding: 7px 12px;
      border: 2px solid #000;
      background: #d3d3d3;
      color: #000;
      text-align: left;
      font-size: 12px;
      cursor: pointer;
    }

    main {
      flex: 1;
      position: relative;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 40px;
    }

    .back-icon {
      position: absolute;
  top: 43px;
  left: 55px;
  width: 30px;
  height: 30px;
  border: 3px solid #294797;
  border-radius: 50%;
  color: #294797;
  background: transparent;
  font-size: 24px;
  font-weight: bold;
  line-height: 1;
  display: flex;
  justify-content: center;
  align-items: center;
  padding: 0;
  cursor: pointer;
  box-shadow: 0 0 0 2px #000000;
    }

    #formSection {
      width: 600px;
      min-height: 495px;
      background: #fff;
      border: 1px solid #cfcfcf;
      border-radius: 30px;
      overflow: hidden;
      box-shadow: 0 0 4px rgba(0,0,0,0.15);
    }

    .form-title {
      background: #d9d9d9;
      padding: 12px 28px;
      font-size: 18px;
      font-weight: bold;
    }

    form {
      padding: 30px 28px 25px;
    }

    .form-group {
      margin-bottom: 20px;
      text-align: left;
    }

    .form-row {
      display: flex;
      gap: 85px;
      margin-bottom: 20px;
    }

    .form-row .form-group {
      flex: 1;
      margin-bottom: 0;
    }

    label {
      display: block;
      margin-bottom: 7px;
      font-size: 13px;
    }

    input,
    textarea {
      width: 100%;
      border: 1px solid #ddd;
      border-radius: 7px;
      padding: 8px 12px;
      font-size: 13px;
      font-family: Arial, sans-serif;
    }

    input {
      height: 31px;
    }

    textarea {
      width: 365px;
      height: 130px;
      resize: none;
    }

    .button-row {
      margin-top: 72px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0 10px;
    }

    button {
      border: none;
      border-radius: 6px;
      background: #294797;
      color: #fff;
      padding: 8px 13px;
      font-size: 12px;
      cursor: pointer;
    }

    button:hover {
      background: #1f3675;
    }
  </style>
</head>

<body>

  <header>
    <div class="logo">
      <img src="UTeM Clear.png" alt="UTeM Logo">
    </div>

    <nav>
      <button type="button">BOOKING SPACE</button>
      <button type="button">APPROVAL/STATUS</button>
    </nav>
  </header>

  <main>
    <button type="button" class="back-icon">&#8592;</button>

    <div id="formSection">
      <div class="form-title">Booking Space</div>

      <form onsubmit="event.preventDefault(); processData();">
        <div class="form-group">
          <label for="fullName">Full Name</label>
          <input type="text" id="fullName" name="fullName" placeholder="Name">
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="phoneNumber">No. H/P</label>
            <input type="tel" id="phoneNumber" name="phoneNumber" placeholder="Phone number">
          </div>

          <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" name="email" placeholder="Email">
          </div>
        </div>

        <div class="form-group">
          <label for="reason">Reason</label>
          <textarea id="reason" name="reason" placeholder="Reason"></textarea>
        </div>

        <div class="button-row">
          <button type="button">Back</button>
          <button type="submit">Submit</button>
        </div>
      </form>
    </div>
  </main>

</body>
</html>
