<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Pusat Sukan Court Booking</title>

  <style>

    #formSection 
    {
      width: 50%;
      margin: auto;
      text-align: center;
      padding: 20px;
      border-radius: 12px;
      background: #ffff;
      color: #000;
    }

    .form-row {
      width: 60%;
      margin: 12px auto;
      display: flex;
      gap: 30px;
      align-items: flex-start;
    }

    .form-group {
      margin: 12px 0;
      text-align: left;
    }

    .form-row .form-group {
      width: 50%;
    }

    select,
    input[type="date"],
    input[type="time"] {
      width: 100%;
      height: 35px;
      font-size: 16px;
      padding: 5px;
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      color: #fff;
      background: url('Main Background.png') no-repeat center center fixed;
      background-size: cover;
      display: flex;
      min-height: 100vh;
      align-items: center;
    }

    header {
      background: #D3D3D3;
      width: 350px;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    nav {
      margin-top: 90px;
      display: flex;
      flex-direction: column;
      gap: 15px;
    }

    nav button {
      padding: 15px;
      border: black solid 2px;
      background: #D3D3D3;
      color: #000000;
      text-align: left;
      font-size: 10px;
      font-weight: bold;
    }

    button {
      padding: 10px 18px;
      margin-top: 10px;
      border: none;
      border-radius: 8px;
      background-color: blue;
      color: white;
      cursor: pointer;
    }
  </style>
</head>

<body>

  <header>
    <div class="logo">
      <img src="UTeM White.png" alt="Pusat Sukan Logo" style="width: 50%; height: auto;">
    </div>

    <nav>
      <button>BOOKING SPACE</button>
      <button>APPROVAL / STATUS</button>
    </nav>
  </header>

  <div id="formSection">
    <h3>Booking Space</h3>

    <form onsubmit="event.preventDefault(); processData();">

      <div class="form-row">
        <div class="form-group">
          <label for="court">Court</label><br>
          <select id="court" name="court">
            <option value="" disabled selected>Choose Court</option>
            <option value="Tennis1">Tennis Court (1)</option>
            <option value="Tennis2">Tennis Court (2)</option>
            <option value="Badminton1">Badminton Court (1)</option>
            <option value="Badminton2">Badminton Court (2)</option>
            <option value="Basketball1">Basketball Court (1)</option>
            <option value="Basketball2">Basketball Court (2)</option>
            <option value="Futsal1">Futsal Court (1)</option>
            <option value="Futsal2">Futsal Court (2)</option>
            <option value="Football">Football Field</option>
            <option value="Rugby">Rugby Field</option>
          </select>
        </div>

        <div class="form-group">
          <label for="dateChoose">Date</label><br>
          <input type="date" id="dateChoose" name="dateChoose">
        </div>
      </div>

      <div class="form-group" style="width: 60%; margin: 12px auto;">
        <label for="apptFrom">Time Slot</label><br>

        <label for="apptFrom">From</label><br>
        <input type="time" id="apptFrom" name="apptFrom"><br>

        <label for="apptTo">To</label><br>
        <input type="time" id="apptTo" name="apptTo">
      </div>

      <button type="submit">Next</button>

    </form>
  </div>

</body>
</html>
