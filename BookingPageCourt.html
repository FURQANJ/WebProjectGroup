<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Booking Space</title>

  <style>
    * 
    {
      box-sizing: border-box;
    }

    body 
    {
      margin: 0;
      font-family: Arial, sans-serif;
      color: #000;
      background: url('Main Background.png') no-repeat center center fixed;
      background-size: cover;
      min-height: 100vh;
      display: flex;
    }

    header 
    {
      width: 250px;
      min-height: 100vh;
      background: #d3d3d3;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding-top: 50px;
    }

    .logo img 
    {
      width: 150px;
      height: auto;
      margin-bottom: 95px;
    }

    nav 
    {
      width: 100%;
      margin-top: 20px;
    }

    nav ul 
    {
      padding: 0;
      margin: 0;
      width: 100%;
    }

    nav ul li 
    {
      width: 100%;
      margin-bottom: 5px;
    }

    nav ul li a 
    {
      display: block;
      padding: 15px 25px;
      text-decoration: none;
      color: #000000; 
      font-size: 14px;
      font-weight: 600;
      transition: all 0.3s ease;
    }

    nav ul li a:hover 
    {
      background-color: #c4c4c4; 
      color: #000000; 
      border-left: 4px solid #000000; 
      padding-left: 30px;
    }

    main 
    {
      flex: 1;
      position: relative;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 40px;
    }

    #formSection 
    {
      width: 600px;
      min-height: 495px;
      background: #fff;
      border: 1px solid #cfcfcf;
      border-radius: 30px;
      overflow: hidden;
      box-shadow: 0 0 4px rgba(0,0,0,0.15);
    }

    .form-title 
    {
      background: #d9d9d9;
      padding: 12px 28px;
      font-size: 18px;
      font-weight: bold;
    }

    form 
    {
      padding: 30px 28px 20px;
    }

    .form-group 
    {
      margin-bottom: 20px;
      text-align: left;
    }

    .form-row 
    {
      display: flex;
      gap: 40px; 
      margin-bottom: 20px;
    }

    .form-row .form-group 
    {
      flex: 1;
      margin-bottom: 0;
    }

    label 
    {
      display: block;
      margin-bottom: 7px;
      font-size: 13px;
    }

    input, textarea, select 
    {
      width: 100%;
      border: 1px solid #ddd;
      border-radius: 7px;
      padding: 8px 12px;
      font-size: 13px;
      font-family: Arial, sans-serif;
    }

    input 
    {
      height: 35px;
    }

    textarea 
    {
      width: 100%;
      height: 130px;
      resize: none;
    }

    select 
    {
      height: 35px;
      background: #fff;
    }

    .button-row 
    {
      margin-top: 150px;
      display: flex;
      justify-content: flex-end;
      padding: 0 10px;
    }

    button 
    {
      border: none;
      border-radius: 6px;
      background: #294797;
      color: #fff;
      padding: 8px 13px;
      font-size: 12px;
      cursor: pointer;
    }

    button:hover 
    {
      background: #1f3675;
    }
  </style>
</head>

<body>

  <header>
    <div class="logo">
      <img src="UTeM Clear.png" alt="UTeM Logo">
    </div>

    <nav>
      <ul>
        <li><a href="MainPage.html">BOOKING SPACE</a></li>
        <li><a href="approval.html">APPROVAL/STATUS</a></li>
      </ul>
    </nav>
  </header>

  <main>
    <div id="formSection">
      <div class="form-title">Booking Space</div>
      <form onsubmit="event.preventDefault(); processData();">

        <div class="form-row">
          <div class="form-group">
            <label for="court">Court</label>
            <select id="court" name="court">
              <option value="" disabled selected>Choose Court</option>
              <option value="Tennis1">Tennis Court (1)</option>
              <option value="Tennis2">Tennis Court (2)</option>
              <option value="Badminton1">Badminton Court (1)</option>
              <option value="Badminton2">Badminton Court (2)</option>
              <option value="Basketball1">Basketball Court (1)</option>
              <option value="Basketball2">Basketball Court (2)</option>
              <option value="Futsal1">Futsal Court (1)</option>
              <option value="Futsal2">Futsal Court (2)</option>
              <option value="Football">Football Field</option>
              <option value="Rugby">Rugby Field</option>
            </select>
          </div>

          <div class="form-group">
            <label for="dateChoose">Date</label>
            <input type="date" id="dateChoose" name="dateChoose">
          </div>
        </div>

          <div class="form-group" style="max-width: 250px;">
            <label for="apptFrom">Time Slot ( From )</label>
            <input type="time" id="apptFrom" name="apptFrom">
          </div>

         <div class="form-group" style="max-width: 250px;">
            <label for="apptTo">Time Slot ( To )</label>
            <input type="time" id="apptTo" name="apptTo">
          </div>

        <div class="button-row">
          <button type="submit">Next</button>
        </div>

      </form>
    </div>
  </main>

</body>
</html>
