<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Pusat Sukan Court Booking</title>
  <style>

    body 
    {
      margin: 0;
      font-family: Arial, sans-serif;
      color: #fff;
      background: url('Main Background.png') no-repeat center center fixed;
      background-size: cover;
      display: flex; 
      min-height: 100vh;
    }

    header 
    {
      background: #D3D3D3;
      width: 350px;
      display: flex;
      flex-direction: column;
    }

    nav 
    {
      margin-top: 90px;
      display: flex;
      flex-direction: column;
      gap: 15px;
    }

    nav button 
    {
      padding: 15px;
      border: black solid 2px;
      background: #D3D3D3;
      color: #000000;
      text-align: left;
      font-size: 10px;
      font-weight: bold;
    }

  </style>
</head>
<body>
  
  <header>
    <div class="logo">
      <img src="UTeM White.png" alt="Pusat Sukan Logo" style="width: 50%; height: auto;">
    </div>
    <nav>
      <button>BOOKING SPACE</button>
      <button>APPROVAL / STATUS</button>
    </nav>
  </header>

</body>
</html>
