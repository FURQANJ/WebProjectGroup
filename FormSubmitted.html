<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Pusat Sukan Court Booking</title>
  
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      color: #000;
      background: url('Main Background.png') no-repeat center center fixed;
      background-size: cover;
      min-height: 100vh;
      display: flex;
    }

    header {
      width: 250px;
      min-height: 100vh;
      background: #d3d3d3;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding-top: 50px;
      flex-shrink: 0;
    }

    .logo img {
      width: 150px;
      height: auto;
      margin-bottom: 40px; /* Dikurangkan sedikit supaya menu tidak terlalu ke bawah */
    }

    nav {
      width: 100%;
      margin-top: 20px;
    }

    nav ul {
      padding: 0;
      margin: 0;
      width: 100%;
      list-style: none; /* Buang bullet point pada list */
    }

    nav ul li {
      width: 100%;
      margin-bottom: 5px;
    }

    nav ul li a {
      display: block;
      padding: 15px 25px;
      text-decoration: none;
      color: #000000; 
      font-size: 14px;
      font-weight: 600;
      transition: all 0.3s ease;
    }

    nav ul li a:hover, nav ul li a.active {
      background-color: #c4c4c4; 
      color: #000000; 
      border-left: 4px solid #000000; 
      padding-left: 30px;
    }

    .main-content {
      flex-grow: 1;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 40px;
    }

    .status-container {
      width: 100%;
      max-width: 800px;
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .status-title {
      font-size: 2rem;
      font-weight: bold;
      margin: 0 0 5px 0;
      color: #000;
    }

    .status-subtitle {
      font-size: 1.4rem;
      font-weight: bold;
      color: #ff0000; 
      margin: 0 0 30px 0;
    }

    /* Rekabentuk Ikon Tick Bulat */
    .checkmark-box {
      font-size: 9rem;
      color: #222;
      margin-bottom: 25px;
      line-height: 1;
    }

    .thank-you-text {
      font-size: 1.5rem;
      font-weight: bold;
      color: #000;
      margin-bottom: 35px;
      letter-spacing: 1px;
    }

    /* Kotak Peringatan Putih */
    .reminder-card {
      background-color: #ffffff;
      border: 1px solid #ccc;
      border-radius: 6px;
      padding: 25px;
      text-align: left;
      width: 100%;
      max-width: 550px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.15);
    }

    .reminder-card h3 {
      margin: 0 0 12px 0;
      font-size: 1.25rem;
      font-weight: bold;
      color: #000;
    }

    .reminder-card p {
      margin: 0 0 8px 0;
      font-size: 1.05rem;
      line-height: 1.4;
      font-weight: bold;
      color: #000;
    }

    .reminder-card p:last-child {
      margin-bottom: 0;
    }
  </style>
</head>
<body>
  
  <header>
    <div class="logo">
      <img src="UTeM Clear.png" alt="Pusat Sukan Logo">
    </div>
    <nav>
      <ul>
        <li><a href="MainPage.html">BOOKING SPACE</a></li>
        <li><a href="approval.html">APPROVAL/STATUS</a></li>
      </ul> </nav>
  </header>

  <main class="main-content">
    <div class="status-container">
      
      <h1 class="status-title">Your Booking Has Been Submitted</h1>
      <p class="status-subtitle">*PLEASE WAIT FOR THE APPROVAL</p>
      
      <div class="checkmark-box">
        <i class="fa-regular fa-circle-check"></i>
      </div>
      
      <div class="thank-you-text">THANK YOU FOR USING OUR WEBSITE !</div>
      
      <div class="reminder-card">
        <h3>Reminder!!!</h3>
        <p>If superior person book the same date as yours, we will reject your booking.</p>
        <p>We would like to apologize for any delays and deficiency.</p>
      </div>

    </div>
  </main>

</body>
</html>
