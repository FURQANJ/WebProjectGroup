<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Pusat Sukan Court Booking</title>
<style>
    * 
    {
      box-sizing: border-box;
    }

    body 
    {
      margin: 0;
      font-family: Arial, sans-serif;
      color: #000;
      background: url('Main Background.png') no-repeat center center fixed;
      background-size: cover;
      min-height: 100vh;
      display: flex;
    }

    header 
    {
      width: 250px;
      min-height: 100vh;
      background: #d3d3d3;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding-top: 50px;
    }

    .logo img 
    {
      width: 150px;
      height: auto;
      margin-bottom: 95px;
    }

    nav 
    {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    nav 
    {
      width: 100%;
      margin-top: 20px;
    }

    nav ul 
    {
      padding: 0;
      margin: 0;
      width: 100%;
    }

    nav ul li 
    {
      width: 100%;
      margin-bottom: 5px;
    }

    nav ul li a 
    {
      display: block;
      padding: 15px 25px;
      text-decoration: none;
      color: #000000; 
      font-size: 14px;
      font-weight: 600;
      transition: all 0.3s ease;
    }

    nav ul li a:hover 
    {
      background-color: #c4c4c4; 
      color: #000000; 
      border-left: 4px solid #000000; 
      padding-left: 30px;
    }
    
  </style>
</head>
<body>
  
  <header>
    <div class="logo">
      <img src="UTeM Clear.png" alt="Pusat Sukan Logo" style="width: 50%; height: auto;">
    </div>
    <nav>
      <ul>
        <li><a href="MainPage.html">BOOKING SPACE</a></li>
        <li><a href="approval.html">APPROVAL/STATUS</a></li>
      </ul>
    </nav>
</body>
</html>
